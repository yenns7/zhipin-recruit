<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <div class="logo">🔗</div>
      <div>
        <h1 class="title">智聘 · Cookie 采集</h1>
        <p class="subtitle">采集 BOSS 直聘 Cookie，同步到智聘系统</p>
      </div>
    </div>

    <!-- 状态区 -->
    <div id="status-area" class="status-area">
      <div class="status-loading">
        <div class="spinner"></div>
        <span>正在检测 BOSS 登录状态…</span>
      </div>
    </div>

    <!-- Cookie 列表 -->
    <div id="cookie-list" class="cookie-list" style="display:none">
      <div class="cookie-header">检测到的 Cookie：</div>
      <div id="cookie-items"></div>
    </div>

    <!-- 操作按钮 -->
    <div class="actions">
      <button id="btn-collect" class="btn btn-primary" disabled>
        <span class="btn-icon">📡</span>
        一键采集并同步到智聘
      </button>
      <button id="btn-refresh" class="btn btn-secondary">
        <span class="btn-icon">🔄</span>
        刷新状态
      </button>
    </div>

    <!-- 提示区 -->
    <div id="hint-area" class="hint-area" style="display:none"></div>

    <!-- 底部 -->
    <div class="footer">
      <span>仅访问 zhipin.com · 数据仅发送到本地智聘服务</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
