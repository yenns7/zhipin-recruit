worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       C:/tools/nginx-1.31.1/conf/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # 上传简历/压缩包可能较大，放宽请求体限制
    client_max_body_size 50m;

    server {
        listen       8080;
        server_name  localhost;

        # 前端静态产物（Vite build 输出）
        root   C:/Users/Administrator/Desktop/hl/frontend/dist;
        index  index.html;

        # 静态资源带 hash，可长缓存
        location /assets/ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # SPA 路由回退：非文件请求都交给 index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API 反向代理到 Flask
        location /api/ {
            proxy_pass         http://127.0.0.1:5000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # ── SSE 流式（/api/agent/chat）关键设置 ──
            # 关闭缓冲，事件才能逐条实时下发；连接长保持，避免流式中途断开
            proxy_buffering    off;
            proxy_cache        off;
            proxy_set_header   Connection "";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
